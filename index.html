    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full transition-transform duration-300 border-r border-white/10 p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black text-blue-500 uppercase italic">Menu</h2>
            <button id="closeMenu" class="text-2xl text-slate-500 hover:text-white"><i class="fa fa-times"></i></button>
        </div>

        <nav class="space-y-4">
            <button id="tutorialBtn" class="w-full flex items-center gap-4 bg-blue-600/10 text-blue-500 p-5 rounded-2xl font-bold border border-blue-600/20 hover:bg-blue-600 hover:text-white transition-all text-left group">

                <div>
                    <span class="block text-sm">Tutorial</span>

                </div>
            </button>
        </nav>

    <div id="menuOverlay" class="fixed inset-0 bg-black/80 hidden backdrop-blur-md"></div>






    <header class="p-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
        <button id="menuBtn" class="text-2xl p-2 text-white hover:text-blue-500 transition-colors">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="text-xl font-black italic text-blue-500 tracking-tighter">JOGOS<span class="text-white">360</span></h1>
        <div id="authBtn" class="cursor-pointer bg-white/5 px-4 py-2 rounded-full border border-white/10 hover:bg-white/10 transition-all">
            <span id="authText" class="text-xs font-bold uppercase tracking-widest text-slate-300">Login</span>
        </div>
    </header>






    <main class="p-4 max-w-5xl mx-auto">
        <div class="relative mb-6">
            <i class="fa fa-search absolute left-4 top-4 text-slate-500"></i>
            <input type="text" id="searchInput" placeholder="Buscar jogo..." 
                class="w-full bg-slate-900 border border-white/10 py-4 pl-12 pr-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all">
        </div>

        <div id="catArea" class="flex gap-2 overflow-x-auto pb-6 no-scrollbar"></div>
        <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
    </main>

    <div id="ad-native-container" class="mt-8 px-4"></div>







    <div id="gameModal" class="fixed inset-0 bg-black/95 z- hidden overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div id="modalContent" class="bg-slate-900 w-full max-w-2xl rounded-3xl overflow-hidden relative border border-white/10 shadow-2xl">
                </div>
            <button id="closeGameModal" class="fixed top-6 right-6 text-white/50 text-4xl hover:text-white transition-all">
                <i class="fa fa-circle-xmark"></i>
            </button>
        </div>
    </div>






    <div id="adminModal" class="fixed inset-0 bg-black/90 z- hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-3xl border border-white/10">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Configurar <span class="text-blue-500">Jogo</span></h2>
            <form id="gameForm" class="space-y-4">
                <input type="text" id="gName" placeholder="Nome do Jogo" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-white outline-none focus:border-blue-500" required>
                <textarea id="gDesc" placeholder="Descrição" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-white h-24 outline-none focus:border-blue-500 resize-none" required></textarea>
                <input type="text" id="gCat" placeholder="Categoria" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-white outline-none focus:border-blue-500" required>
                <input type="text" id="gImg" placeholder="Link da Imagem" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-white outline-none focus:border-blue-500">
                <input type="text" id="gLink" placeholder="Link de Download" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-white outline-none focus:border-blue-500" required>
                <div class="flex gap-2 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold uppercase hover:bg-blue-500 shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Salvar</button>
                    <button type="button" id="cancelBtn" class="px-6 bg-slate-800 rounded-xl font-bold text-slate-400">X</button>
                </div>
            </form>
        </div>
    </div>






    <button id="openAddModal" class="hidden fixed bottom-6 right-6 bg-blue-600 w-16 h-16 rounded-2xl shadow-2xl text-2xl z-50 hover:bg-blue-500 active:scale-90 transition-all border border-white/10">
